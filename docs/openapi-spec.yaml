  /vulnerabilities:
    get:
      tags:
      - Vulnerabilities
      summary: List all vulnerabilities
      description: 'Retrieve a paginated list of vulnerabilities with comprehensive filtering options.

        Supports filtering by severity, status, EPSS score, and asset association.

        '
      operationId: listVulnerabilities
      parameters:
      - name: X-API-Key
        in: header
        description: API Key for authentication
        required: false
        schema:
          type: string
          default: '{{DAVE_API_KEY}}'
        example: '{{DAVE_API_KEY}}'
      - name: page
        in: query
        description: Page number for pagination
        required: false
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        description: Number of items per page (max 100)
        required: false
        schema:
          type: integer
          default: 25
          minimum: 1
          maximum: 100
      - name: search
        in: query
        description: Search term to filter by CVE ID or description
        required: false
        schema:
          type: string
      - name: severity
        in: query
        description: Filter by severity level
        required: false
        schema:
          type: string
          enum:
          - Critical
          - High
          - Medium
          - Low
      - name: status
        in: query
        description: Filter by remediation status
        required: false
        schema:
          type: string
          enum:
          - Open
          - In Progress
          - Resolved
      - name: asset_id
        in: query
        description: Filter vulnerabilities affecting a specific asset
        required: false
        schema:
          type: string
          format: uuid
      - name: epss-gt
        in: query
        description: Filter vulnerabilities with EPSS score greater than or equal to this value
        required: false
        schema:
          type: number
          format: float
          minimum: 0
          maximum: 1
      - name: epss-percentile-gt
        in: query
        description: Filter vulnerabilities with EPSS percentile greater than or equal to this value
        required: false
        schema:
          type: number
          format: float
          minimum: 0
          maximum: 1
      - name: sort
        in: query
        description: Field to sort by
        required: false
        schema:
          type: string
          enum:
          - severity
          - cvss_score
          - published_date
          - epss
          - epss_percentile
          - affected_assets
          default: severity
      - name: sort_dir
        in: query
        description: Sort direction
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
          default: desc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VulnerabilitySummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  timestamp:
                    type: string
                    format: date-time
              examples:
