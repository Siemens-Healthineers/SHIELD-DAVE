openapi: 3.0.3
info:
  title: DAVE API
  description: 'Comprehensive REST API for Device Assessment and Vulnerability Exposure (DAVE)


    This API provides endpoints for managing assets, vulnerabilities, risks, software components, and patches

    in a healthcare cybersecurity environment.


    ## Authentication

    All endpoints require authentication using:

    - API Key authentication (via X-API-Key header)


    ### Using X-API-Key Header

    Include your API key in the `X-API-Key` header:

    ```

    X-API-Key: {{DAVE_API_KEY}}

    ```


    In Postman, you can use environment variables like `{{DAVE_API_KEY}}` which will be automatically replaced.


    ## Rate Limiting

    API calls are subject to rate limiting to ensure fair usage.


    ## Error Handling

    All errors follow a consistent format with a `success` boolean, `error` object containing `code` and `message`,

    and a timestamp.

    '
  version: 1.3.0
  contact:
    name: Siemens Healthineers
    email: support@example.com
  license:
    name: Proprietary
    url: https://example.com/license
servers:
- url: http://{host}/api/v1
  description: '🔧 Custom HTTP server - Enter your IP or hostname (e.g., 192.168.1.100)'
  variables:
    host:
      default: localhost
      description: 'Enter server IP address or hostname (e.g., 192.168.1.100, 10.0.0.5, myserver.local)'
- url: http://{host}:{port}/api/v1
  description: '🔧 Custom HTTP server with port'
  variables:
    host:
      default: localhost
      description: Server hostname or IP address
    port:
      default: '80'
      description: Server port number
      enum:
        - '80'
        - '8080'
        - '8000'
        - '3000'
- url: https://{host}/api/v1
  description: '🔒 Custom HTTPS server'
  variables:
    host:
      default: api.dave.example.com
      description: Server hostname (e.g., api.yourdomain.com, abc123.ngrok.io)
- url: http://localhost/api/v1
  description: 💻 Local development server (localhost)
- url: https://api.dave.example.com/api/v1
  description: 🌐 Production server (HTTPS)
tags:
- name: Assets
  description: Asset management operations - manage medical devices and IT assets
- name: Vulnerabilities
  description: Vulnerability management operations - CVE tracking and remediation
- name: Risks
  description: Risk management operations - risk assessment and prioritization
- name: Components
  description: Software component management - SBOM and dependency tracking
- name: Patches
  description: Patch management operations - patch tracking and deployment
security:
- DAVE_API_KEY: []
paths:
  /assets:
    get:
      tags:
      - Assets
      summary: List all assets
      description: 'Retrieve a paginated list of assets with optional filtering and search capabilities.

        Supports filtering by department, asset type, status, and CVE associations.

        '
      operationId: listAssets
      parameters:
      - name: X-API-Key
        in: header
        description: API Key for authentication
        required: false
        schema:
          type: string
          default: '{{DAVE_API_KEY}}'
        example: '{{DAVE_API_KEY}}'
      - name: page
        in: query
        description: Page number for pagination (starts at 1)
        required: false
        schema:
          type: integer
          default: 1
          minimum: 1
      - name: limit
        in: query
        description: Number of items per page (max 100)
        required: false
        schema:
          type: integer
          default: 25
          minimum: 1
          maximum: 100
      - name: search
        in: query
        description: Search term to filter by hostname, IP address, or manufacturer
        required: false
        schema:
          type: string
      - name: department
        in: query
        description: Filter by department
        required: false
        schema:
          type: string
      - name: asset_type
        in: query
        description: Filter by asset type
        required: false
        schema:
          type: string
          enum:
          - Medical Device
          - Network Equipment
          - Server
          - Workstation
          - IoT Device
      - name: status
        in: query
        description: Filter by asset status
        required: false
        schema:
          type: string
          enum:
          - Active
          - Inactive
          - Disposed
      - name: cve_filter
        in: query
        description: Comma-separated list of CVE IDs to filter assets that have these vulnerabilities
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AssetSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                  timestamp:
                    type: string
                    format: date-time
                    example: '2026-02-02T10:30:45+00:00'
              examples:
                success:
                  summary: Successful asset list response
                  value:
                    success: true
                    data:
                    - asset_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      hostname: CT-SCANNER-01
                      ip_address: 10.20.30.40
                      asset_type: Medical Device
                      manufacturer: Siemens Healthineers
                      model: SOMATOM Drive
                      serial_number: SN123456789
                      department: Radiology
                      location: Building A - Floor 2
                      criticality: Clinical-High
                      status: Active
                      last_seen: '2026-02-02T09:15:30'
                      created_at: '2025-08-21T08:00:00'
                      updated_at: '2026-02-02T09:15:30'
                      mapping_status: Mapped
                      brand_name: SOMATOM
                      device_name: SOMATOM Drive CT Scanner
                      manufacturer_name: Siemens Healthineers
                      metadata: '{"object_id": "OO-11111", "provider": "Acme Services"}'
                    pagination:
                      page: 1
                      limit: 25
                      total: 150
                      pages: 6
                    timestamp: '2026-02-02T10:30:45+00:00'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
